# LeanInfer Preset: DeepSeek-R1-14B (Dense Distill) — Quality
# Target: 16 GB RAM | Estimated: ~9 GB (model ~8 GB + cache ~1 GB)
# Use case: Best open reasoning model at 14B, standard transformer
#
# Note: DeepSeek-R1-14B is a dense model (not MoE). Standard transformer,
# no DeltaNet. Benefits from ik_llama's FlashMLA if available.
#
# Quantization recipe:
#   llama-quantize --imatrix imatrix.dat \
#     --attn-qkv-type IQ4_K --attn-output-type IQ4_K \
#     --ffn-gate-type IQ4_K --ffn-up-type IQ4_K --ffn-down-type IQ4_K \
#     input.gguf output-q4k.gguf IQ4_K
#
# Runtime flags:

# KV cache: Q8
-ctk q8_0
-ctv q8_0

# Flash attention
-fa on

# Runtime repacking
--run-time-repack

# Context
-c 16384
-b 512

# Thinking enabled (DeepSeek uses deepseek format)
--reasoning-format deepseek

# Sampling (thinking mode)
--temp 1.0
--top-p 0.95
--top-k 20
--presence-penalty 1.5
