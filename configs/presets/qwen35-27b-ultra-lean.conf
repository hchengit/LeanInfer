# LeanInfer Preset: Qwen 3.5-27B — Ultra-Lean
# Target: 12 GB RAM | Estimated: ~9 GB (model ~8 GB + cache ~1 GB)
# Use case: Absolute minimum for 27B — quality tradeoff accepted
#
# Strategy: IQ2_K everything + Q4 Hadamard K-cache
# Warning: Noticeable quality reduction at 2-bit. Use for speed/RAM constrained scenarios.
#
# Quantization recipe:
#   llama-quantize --imatrix imatrix.dat \
#     input.gguf output-ultra-lean.gguf IQ2_K
#
# Runtime flags:

# KV cache: Q4 K-cache with Hadamard + Q4 V-cache
-khad
-ctk q4_0
-ctv q4_0

# Flash attention
-fa on

# Runtime repacking
--run-time-repack

# Minimal context
-c 4096
-b 512

# No-think mode
--no-think

# Sampling
--temp 0.7
--top-p 0.8
--top-k 20
--presence-penalty 1.5
