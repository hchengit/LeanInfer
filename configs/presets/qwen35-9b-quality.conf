# LeanInfer Preset: Qwen 3.5-9B — Quality
# Target: 16 GB RAM | Estimated: ~6 GB (model ~5 GB + cache ~1 GB)
# Use case: Best quality hybrid reasoning on consumer hardware
#
# Quantization recipe:
#   llama-quantize --imatrix imatrix.dat \
#     input.gguf output-q4k.gguf IQ4_K
#
# Runtime flags:

# KV cache: Q8 for minimal quality loss
-ctk q8_0
-ctv q8_0

# Flash attention
-fa on

# Runtime repacking
--run-time-repack

# Context
-c 16384
-b 512

# Thinking enabled
--reasoning-format deepseek

# Sampling (thinking mode)
--temp 1.0
--top-p 0.95
--top-k 20
--presence-penalty 1.5
