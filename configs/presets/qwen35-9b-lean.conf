# LeanInfer preset: Qwen 3.5 9B — Lean mode
# Target: 8 GB RAM systems
# Estimated total RAM: ~4 GB (model ~3.5 GB + cache ~0.5 GB)

# Quantization: mixed precision
--custom-q "attn.*=IQ4_K,ffn_down.*=IQ3_K,ffn_up.*=IQ3_K,ffn_gate.*=IQ3_K"

# KV cache: Q4 with Hadamard
-khad
-ctk q4_0
-ctv q8_0

# Flash attention
-fa

# Runtime repacking
-rtr

# Context and batch
-c 8192
-b 512

# Thinking control
--chat-template-kwargs '{"enable_thinking":false}'
--reasoning-budget 0

# Sampling
--temp 0.7
--top-p 0.8
--top-k 20
--presence-penalty 1.5

# Threads
-t 4
