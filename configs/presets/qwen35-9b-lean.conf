# LeanInfer Preset: Qwen 3.5-9B — Lean
# Target: 8 GB RAM | Estimated: ~4 GB (model ~3.5 GB + cache ~0.5 GB)
# Use case: Run 9B hybrid reasoning model comfortably on 8 GB machine
#
# Quantization recipe:
#   llama-quantize --imatrix imatrix.dat \
#     --attn-qkv-type IQ4_K --attn-output-type IQ4_K \
#     --ffn-gate-type IQ3_K --ffn-up-type IQ3_K --ffn-down-type IQ3_K \
#     input.gguf output-lean.gguf IQ3_K
#
# Runtime flags:

# KV cache: Q4 K-cache with Hadamard + Q8 V-cache
-khad
-ctk q4_0
-ctv q8_0

# Flash attention
-fa on

# Runtime repacking
--run-time-repack

# Context
-c 8192
-b 512

# No-think by default
--no-think

# Sampling
--temp 0.7
--top-p 0.8
--top-k 20
--presence-penalty 1.5
