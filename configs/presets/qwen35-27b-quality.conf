# LeanInfer preset: Qwen 3.5 27B — Quality mode
# Target: 32 GB RAM systems
# Estimated total RAM: ~17 GB (model ~15 GB + cache ~2 GB)

# Quantization: IQ4_K uniform for best quality-per-bit
--custom-q ".*=IQ4_K"

# KV cache: Q8 for minimal quality loss
-ctk q8_0
-ctv q8_0

# Flash attention
-fa

# Runtime repacking
-rtr

# Context and batch
-c 16384
-b 512

# Thinking enabled (reasoning mode)
--chat-template-kwargs '{"enable_thinking":true}'
--reasoning-format deepseek

# Sampling for thinking mode
--temp 1.0
--top-p 0.95
--top-k 20
--presence-penalty 1.5

# Threads
-t 8
