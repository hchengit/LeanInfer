# LeanInfer Preset: Qwen 3.5-27B — Quality
# Target: 32 GB RAM | Estimated: ~17 GB (model ~15 GB + cache ~2 GB)
# Use case: Best quality for reasoning tasks where RAM is not tight
#
# Quantization recipe (for llama-quantize):
#   llama-quantize --imatrix imatrix.dat \
#     --attn-qkv-type IQ4_K --attn-output-type IQ4_K \
#     --ffn-gate-type IQ4_K --ffn-up-type IQ4_K --ffn-down-type IQ4_K \
#     input.gguf output-q4k.gguf IQ4_K
#
# Runtime flags (for llama-cli / llama-server):

# KV cache: Q8 for minimal quality loss
-ctk q8_0
-ctv q8_0

# Flash attention (required for quantized KV)
-fa on

# Runtime repacking (1.6x CPU speedup, one-time startup cost)
--run-time-repack

# Context
-c 16384
-b 512

# Thinking enabled
--reasoning-format deepseek

# Sampling (Qwen recommended for thinking mode)
--temp 1.0
--top-p 0.95
--top-k 20
--presence-penalty 1.5
