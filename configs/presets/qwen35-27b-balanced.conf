# LeanInfer Preset: Qwen 3.5-27B — Balanced
# Target: 24 GB RAM | Estimated: ~13.5 GB (model ~12 GB + cache ~1.5 GB)
# Use case: Good quality with meaningful RAM savings
#
# Strategy: Attention layers at IQ4_K (quality-sensitive), FFN at IQ3_K (bigger, less sensitive)
# Profiling showed FFN = 30-43% of compute — lower precision here saves the most bytes
#
# Quantization recipe:
#   llama-quantize --imatrix imatrix.dat \
#     --attn-qkv-type IQ4_K --attn-output-type IQ4_K \
#     --ffn-gate-type IQ3_K --ffn-up-type IQ3_K --ffn-down-type IQ3_K \
#     input.gguf output-balanced.gguf IQ3_K
#
# Runtime flags:

# KV cache: Q8 K-cache, Q8 V-cache
-ctk q8_0
-ctv q8_0

# Flash attention
-fa on

# Runtime repacking
--run-time-repack

# Context
-c 16384
-b 512

# Thinking enabled
--reasoning-format deepseek

# Sampling
--temp 1.0
--top-p 0.95
--top-k 20
--presence-penalty 1.5
