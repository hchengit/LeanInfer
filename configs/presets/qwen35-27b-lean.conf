# LeanInfer Preset: Qwen 3.5-27B — Lean
# Target: 16 GB RAM | Estimated: ~11 GB (model ~10 GB + cache ~1 GB)
# Use case: Fit 27B model on 16 GB machine (tight but functional)
#
# Strategy: Mixed quant + Hadamard K-cache transforms for Q4 K-cache viability
# Hadamard (-khad) reduces Q4 K-cache error by ~3x (from ik_llama benchmarks)
#
# Quantization recipe:
#   llama-quantize --imatrix imatrix.dat \
#     --attn-qkv-type IQ4_K --attn-output-type IQ4_K \
#     --ffn-gate-type IQ3_K --ffn-up-type IQ3_K --ffn-down-type IQ3_K \
#     input.gguf output-lean.gguf IQ3_K
#
# Runtime flags:

# KV cache: Q4 K-cache with Hadamard transforms + Q8 V-cache
-khad
-ctk q4_0
-ctv q8_0

# Flash attention
-fa on

# Runtime repacking
--run-time-repack

# Reduced context for RAM constraint
-c 8192
-b 512

# No-think mode by default (saves tokens, enable per-request if needed)
--no-think

# Sampling (non-thinking)
--temp 0.7
--top-p 0.8
--top-k 20
--presence-penalty 1.5
