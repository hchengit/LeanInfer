# LeanInfer preset: Qwen 3.5 27B — Lean mode
# Target: 16 GB RAM systems
# Estimated total RAM: ~11 GB (model ~10 GB + cache ~1 GB)

# Quantization: mixed precision — attention layers higher, FFN lower
--custom-q "attn.*=IQ4_K,ffn_down.*=IQ3_K,ffn_up.*=IQ3_K,ffn_gate.*=IQ3_K"

# KV cache: Q4 with Hadamard transforms for quality recovery
-khad
-ctk q4_0
-ctv q8_0

# Flash attention (required for quantized KV cache)
-fa

# Runtime repacking for CPU speedup
-rtr

# Context and batch
-c 8192
-b 512

# Thinking control (disable by default, enable per-request)
--chat-template-kwargs '{"enable_thinking":false}'
--reasoning-budget 0

# Sampling for non-thinking mode
--temp 0.7
--top-p 0.8
--top-k 20
--presence-penalty 1.5

# Threads (adjust to your physical core count)
-t 8
